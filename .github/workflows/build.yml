name: Build & Release Docker Image

on:
  push:
    tags: ['v*']          # Only build on tag push (e.g. v1.0.0)
  workflow_dispatch:       # Also supports manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cintia09/openclaw-pro

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Write permission needed to upload Release
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build lite Docker image
      - name: Build lite Docker image
        run: docker build --build-arg BUILD_VERSION=${{ github.ref_name }} -f Dockerfile.lite -t openclaw-pro:lite .

      # Push to GHCR (optional, for users with access)
      - name: Tag and push to GHCR
        run: |
          set -euo pipefail

          push_with_retry() {
            local image_ref="$1"
            local max_retry=4
            local attempt=1
            while [ "$attempt" -le "$max_retry" ]; do
              echo "[push] attempt ${attempt}/${max_retry}: ${image_ref}"
              if docker push "$image_ref"; then
                echo "[push] success: ${image_ref}"
                return 0
              fi
              if [ "$attempt" -lt "$max_retry" ]; then
                local wait_sec=$((attempt * 5))
                echo "[push] retry after ${wait_sec}s: ${image_ref}"
                sleep "$wait_sec"
              fi
              attempt=$((attempt + 1))
            done
            echo "[push] failed after ${max_retry} attempts: ${image_ref}" >&2
            return 1
          }

          docker tag openclaw-pro:lite ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker tag openclaw-pro:lite ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:lite
          docker tag openclaw-pro:lite ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-lite

          push_with_retry "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          push_with_retry "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:lite"
          push_with_retry "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-lite"

      # Export image as tar.gz (direct download, no Docker Hub/GHCR needed)
      - name: Export images as tar.gz
        run: |
          docker save openclaw-pro:lite | gzip > openclaw-pro-image-lite.tar.gz
          ls -lh openclaw-pro-image-lite.tar.gz
          sha256sum openclaw-pro-image-lite.tar.gz > openclaw-pro-image-lite.tar.gz.sha256

      # Upload to GitHub Release
      - name: Create Release and upload image
        uses: softprops/action-gh-release@v2
        with:
          name: OpenClaw Pro ${{ github.ref_name }}
          body: |
            ## OpenClaw Pro Docker Image

            ### Image Version
            - **Lite (sole release edition)** `openclaw-pro-image-lite.tar.gz` (~250 MB)

            ### One-Click Install (Windows)
            ```powershell
            irm https://raw.githubusercontent.com/cintia09/openclaw-pro/main/install-windows.ps1 | iex
            ```

            ### One-Click Install (Linux / macOS)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/cintia09/openclaw-pro/main/install.sh | bash
            ```

            ### Manual Install
            1. Download the image file (Lite)
            2. `docker load < openclaw-pro-image-lite.tar.gz`
            3. Create state volume: `docker volume create openclaw-pro-state`
            4. HTTP direct mode:
              `docker run -d --name openclaw-pro -p 18789:18789 -p 3000:3000 -v openclaw-pro-state:/root/.openclaw --restart unless-stopped openclaw-pro:latest`

            5. HTTPS reverse-proxy mode (recommended; domain must resolve to this host):
              - Write `docker-config.json` into the state volume first:
                 `{"domain":"your.domain.com","http_port":80,"https_port":443,"browserEnabled":false}`
               - Run the container:
                `docker run -d --name openclaw-pro -p 80:80 -p 443:443 -v openclaw-pro-state:/root/.openclaw --restart unless-stopped openclaw-pro:latest`

            6. The browser feature is disabled by default. Enable it in the Web panel under **System Settings** (restart the container after saving).

            ---

            ## OpenClaw Pro Docker 镜像

            ### 镜像版本
            - **Lite（唯一发布版本）** `openclaw-pro-image-lite.tar.gz` (~250MB)

            ### 一键安装 (Windows)
            ```powershell
            irm https://raw.githubusercontent.com/cintia09/openclaw-pro/main/install-windows.ps1 | iex
            ```

            ### 一键安装 (Linux/macOS)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/cintia09/openclaw-pro/main/install.sh | bash
            ```

            ### 手动安装
            1. 下载镜像文件（Lite）
            2. `docker load < openclaw-pro-image-lite.tar.gz`
            3. 创建状态卷：`docker volume create openclaw-pro-state`
            4. HTTP 直连模式：
              `docker run -d --name openclaw-pro -p 18789:18789 -p 3000:3000 -v openclaw-pro-state:/root/.openclaw --restart unless-stopped openclaw-pro:latest`

            5. HTTPS 反代模式（推荐，需域名解析到本机）：
              - 先写入状态卷中的 `docker-config.json`：
                 `{"domain":"your.domain.com","http_port":80,"https_port":443,"browserEnabled":false}`
               - 运行容器：
                `docker run -d --name openclaw-pro -p 80:80 -p 443:443 -v openclaw-pro-state:/root/.openclaw --restart unless-stopped openclaw-pro:latest`

            6. 浏览器功能默认关闭，可在 Web 面板「系统设置」里开启（保存后重启容器生效）。
          files: |
            openclaw-pro-image-lite.tar.gz
            openclaw-pro-image-lite.tar.gz.sha256
